  ];

  const grid = document.getElementById('prof-grid');

  professorData.forEach((prof, pIdx) => {
    const item = document.createElement('div');
    item.className = 'professor-item';
    
    let listHtml = '';
    prof.videos.forEach((url, vIdx) => {
      listHtml += `<li><a href="${url}" target="_blank">🎥 제${vIdx + 1}강 강의보기</a></li>`;
    });

    item.innerHTML = `
      <button type="button" class="lecture-btn" onclick="toggleList('list${pIdx}', this)">
        ${prof.name} <span class="arrow">▼</span>
      </button>
      <ul id="list${pIdx}" class="link-list">
        ${listHtml}
      </ul>
    `;
    grid.appendChild(item);
  });

  function toggleList(listId, btn) {
    const list = document.getElementById(listId);
    const arrow = btn.querySelector('.arrow');
    const isVisible = list.style.display === "block";

    document.querySelectorAll('.link-list').forEach(el => {
      el.style.display = 'none';
      el.previousElementSibling.querySelector('.arrow').innerHTML = "▼";
    });

    if (!isVisible) {
      list.style.display = "block";
      arrow.innerHTML = "▲";
    }
  }
</script>

  .link-list {
